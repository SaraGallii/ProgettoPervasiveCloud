<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Empatica E4</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="{{ url_for('static', filename='chart.umd.min.js') }}"></script>
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div>
        <h1 class="h1">Dashboard</h1>
        <p class="muted">Grafico (1 sensore) — aggiornamento automatico ogni 10s</p>
      </div>
      <div class="right">
        <a class="btn btn-outline" href="{{ url_for('index') }}">Home</a>
        <a class="btn btn-outline" href="{{ url_for('statistics_page') }}">Statistiche</a>
        <a class="btn btn-outline" href="{{ url_for('logout') }}">Logout</a>
      </div>
    </header>

    <section class="card">
      {% if not users %}
        <div class="alert">Nessun dato nel DB. Avvia <code>client.py</code> per iniziare lo streaming.</div>
      {% endif %}

      <form class="controls" method="get" action="{{ url_for('dashboard') }}">
        <div>
          <label>Utente</label>
          <select name="u">
            {% for u in users %}
              <option value="{{ u }}" {% if u == selected_user %}selected{% endif %}>{{ u }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label>Sessione</label>
          <select name="s">
            {% for s in sessions %}
              <option value="{{ s }}" {% if s == selected_sess %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label>Sensore</label>
          <select name="sensor" id="sensorSelect">
            {% for s in sensors %}
              <option value="{{ s }}" {% if s == selected_sensor %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="controls-actions">
          <button class="btn" type="submit">Aggiorna</button>
        </div>
      </form>
    </section>

    <section class="card chart-card">
      <div class="chart-title">
        <strong>{{ selected_sensor }}</strong>
        <span class="muted">UTENTE {{ selected_user }} — SESSIONE {{ selected_sess }}</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </section>
  </div>

  <script>
    const sensorSelect = document.getElementById('sensorSelect');
    if (sensorSelect) {
      const last = localStorage.getItem('activeSensor');
      if (last && Array.from(sensorSelect.options).some(o => o.value === last)) {
        sensorSelect.value = last;
      }
      sensorSelect.addEventListener('change', () => localStorage.setItem('activeSensor', sensorSelect.value));
    }

    const chartData = {{ chart_data | tojson }};
  </script>
  <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
